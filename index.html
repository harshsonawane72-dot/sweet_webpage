<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Little Surprise For You 💫</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: linear-gradient(to top right, #ffc9de, #ffd1dc);
  font-family: Arial, sans-serif;
  transition: background 1s ease-in-out;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

#content {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  gap: 15px;
  z-index: 5;
}

.question {
  font-size: 1.8rem;
  color: black;
  text-shadow: 1px 1px 2px #ff69b4;
  max-width: 90%;
}

.sticker {
  width: 60%;
  max-width: 240px;
  border-radius: 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  object-fit: cover;
  animation: popImage 0.6s ease;
}

@keyframes popImage {
  from { transform: scale(0.85); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.final {
  font-size: 1.8rem;
  color: black;
  text-shadow: 2px 2px 8px #ff4d6d;
  opacity: 0;
  transform: scale(0.8);
  transition: all 1s ease;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 2px 2px 8px #ff4d6d; }
  to { text-shadow: 2px 2px 18px #ff1e4d; }
}

button {
  padding: 8px 25px;
  background: #ff4d6d;
  border: none;
  border-radius: 25px;
  color: white;
  font-size: 1rem;
  cursor: pointer;
  box-shadow: 2px 2px 10px #ff8fa3;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.08);
}

/* Floating Hearts */
.heart {
  width: 18px;
  height: 18px;
  background: black;
  position: absolute;
  top: 100%;
  transform: rotate(-45deg);
  animation: floatUp 8s linear infinite;
  opacity: 0;
}

.heart::before,
.heart::after {
  content: "";
  width: 18px;
  height: 18px;
  background: black;
  border-radius: 50%;
  position: absolute;
}

.heart::before { top: -9px; left: 0; }
.heart::after { left: 9px; top: 0; }

@keyframes floatUp {
  0% { top: 100%; opacity: 0; transform: rotate(-45deg) scale(0.5); }
  10% { opacity: 1; }
  100% { top: -10%; transform: rotate(360deg) scale(1.2); opacity: 0; }
}
</style>
</head>

<body>

<!-- 🎵 Background Music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mp3">
</audio>

<div id="content">
  <div class="question" id="question"></div>
  <img src="" class="sticker" id="sticker">
  <div class="final" id="final">Lucky to have a friend like you 😊✨</div>
  <button id="nextBtn">Tap Here 💛</button>
</div>

<script>
const questions = [
  "Thank you mom for the premium face card 😌✨",
  "A little bundle of joy ✨",
  "That smile says everything 🫠🤌💗",
  "Some moments deserve to be remembered 🤍",
  "Simplicity is the ultimate beauty 🖤"
];

const stickers = [
  "1.png",
  "2.png",
  "3.png",
  "4.png",
  "5.png"
];

let step = 0;
const questionEl = document.getElementById("question");
const stickerEl = document.getElementById("sticker");
const finalEl = document.getElementById("final");
const nextBtn = document.getElementById("nextBtn");
const music = document.getElementById("bgMusic");

const colors = [
  "linear-gradient(135deg, #ffdde1, #ee9ca7)",
  "linear-gradient(135deg, #dbeafe, #93c5fd)",
  "linear-gradient(135deg, #e0c3fc, #8ec5fc)"
];

let bgInterval;

function showStep() {
  if (step < questions.length) {
    questionEl.textContent = questions[step];
    stickerEl.src = stickers[step];
  } else {
    questionEl.style.display = "none";
    stickerEl.style.display = "none";
    nextBtn.style.display = "none";

    setTimeout(() => {
      finalEl.style.opacity = "1";
      finalEl.style.transform = "scale(1)";
    }, 2000);
  }
  step++;
}

nextBtn.addEventListener("click", function() {

  if (music.paused) {
    music.volume = 0.5;
    music.play().catch(() => {});
  }

  showStep();

  // Start random background change after first click
  if (!bgInterval) {
    bgInterval = setInterval(() => {
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      document.body.style.background = randomColor;
    }, 3000);
  }
});

showStep();

/* Floating Hearts */
for (let i = 0; i < 25; i++) {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (5 + Math.random() * 5) + "s";
  heart.style.animationDelay = (Math.random() * 5) + "s";
  document.body.appendChild(heart);
}
</script>

</body>
</html>
